name = "zmail"
main = "worker/src/index.ts"

# 打包配置
minify = true # 生产环境压缩代码
compatibility_flags = [ "nodejs_compat" ]
compatibility_date = "2025-03-01"

# 设置自定义域名
routes = [
  { pattern = "mail.6.1.a.a.f.f.0.7.0.0.6.2.ip6.arpa", custom_domain = true }
]

# 启用 D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "zmail"  # 替换为您的实际的数据库 NAME
database_id = "04af3ad9-5e54-454f-a719-68da04167883"  # 需要替换为您的实际数据库 ID

# 设置域名
[vars]
VITE_EMAIL_DOMAIN = "6.1.a.a.f.f.0.7.0.0.6.2.ip6.arpa,d.2.4.b.0.d.0.0.1.0.a.2.ip6.arpa,5.1.0.0.7.2.f.1.0.7.4.0.1.0.0.2.ip6.arpa,5.9.f.0.9.1.0.0.0.7.4.0.1.0.0.2.ip6.arpa"   # 替换为您的域名列表，多个域名使用逗号 , 分割。这里的域名只是用来网页上展示，方便复制粘贴使用。

# 配置邮件处理
[triggers]
crons = ["0 * * * *"]  # 每小时运行一次清理任务

[build]
command = "pnpm run build"

[assets]
binding = "ASSETS"
directory = "frontend/dist"
not_found_handling = "single-page-application"

# 默认开启日志，方便调试
[observability]
enabled = false
head_sampling_rate = 1 # optional. default = 1.
